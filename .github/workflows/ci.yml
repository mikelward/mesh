name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

  freebsd-check:
    name: Check (FreeBSD target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain and FreeBSD target
        run: rustup toolchain install stable --profile minimal --target x86_64-unknown-freebsd

      - name: Check all targets
        run: cargo check --workspace --all-targets --target x86_64-unknown-freebsd

  musl-check:
    name: Check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain and target
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}

      - name: Check all targets
        run: cargo check --workspace --all-targets --target ${{ matrix.target }}
