name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verify the crates actually build on the MSRV floor declared in
      # Cargo.toml, rather than trusting the number by hand. Reading it here
      # keeps the check pinned to a single source of truth.
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          version="$(grep '^rust-version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          # A two-component MSRV (e.g. 1.95) selects rustup's moving 1.95.x
          # channel, which would keep passing on 1.95.1 even if the floor
          # release 1.95.0 stopped compiling. Append .0 to pin the exact floor.
          case "$version" in *.*.*) ;; *) version="$version.0" ;; esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install MSRV toolchain
        run: rustup toolchain install ${{ steps.msrv.outputs.version }} --profile minimal

      - name: Check
        run: cargo +${{ steps.msrv.outputs.version }} check --workspace --locked
