name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Install macOS target
        run: rustup target add x86_64-apple-darwin

      - name: Install cross compiler
        uses: mlugg/setup-zig@v2

      # Zig compiles bundled C dependencies; `cargo check` then type-checks all
      # macOS Rust code without needing an Apple linker or a macOS runner.
      - name: Check macOS
        env:
          CC_x86_64_apple_darwin: zig cc
        run: cargo check --workspace --all-targets --target x86_64-apple-darwin
