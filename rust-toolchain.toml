# Track current stable so contributors and CI use the same channel and pick up
# fixes automatically. This floats rather than pins an exact release: mesh is
# pre-alpha with zero dependencies, so toolchain drift is low-risk and CI (which
# uses this file) catches any new-compiler/Clippy breakage on every PR. Pin an
# exact `major.minor.patch` here if reproducibility ever needs to be exact.
# `rust-version` in Cargo.toml records the supported MSRV floor.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
